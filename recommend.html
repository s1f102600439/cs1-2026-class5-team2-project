<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>おすすめアイス</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/recommend.css">
</head>

<body>

<header>
    
     <a class="logo-link" href="index.html">
        <img class="logo" src="images/logo.png" alt="ロゴ">
    </a>

    <nav>
        <a href="index.html">トップ</a>
        <a href="history.html">歴史</a>
        <a href="recommend.html">おすすめ</a>
    </nav>

</header>

<main>

<h1>おすすめアイス</h1>

<div class="ice-list">

    <div class="ice-card">
        <img src="images/ice1.jpg" alt="バニラ">
        <h3>バニラ</h3>
        <button class="detail-btn" data-title="バニラ" data-desc="王道のバニラアイスです。濃厚なミルクのコクとバニラビーンズの豊かな風味を楽しめます。">詳細を見る</button>
    </div>

    <div class="ice-card">
        <img src="images/ice2.jpg" alt="チョコ">
        <h3>チョコ</h3>
        <button class="detail-btn" data-title="チョコ" data-desc="カカオの香りが引き立つ、甘さ控えめでビターな大人のチョコレートアイスです。">詳細を見る</button>
    </div>

    <div class="ice-card">
        <img src="images/ice3.jpg" alt="抹茶">
        <h3>抹茶</h3>
        <button class="detail-btn" data-title="抹茶" data-desc="宇治抹茶を贅沢に使用。上品な苦味と、すっきりとした後味が特徴です。">詳細を見る</button>
    </div>

    <div class="ice-card">
        <img src="images/ice4.jpg" alt="いちご">
        <h3>いちご</h3>
        <button class="detail-btn" data-title="いちご" data-desc="つぶつぶ食感の果肉が入った、甘酸っぱくて爽やかないちごアイスです。">詳細を見る</button>
    </div>

    <div class="ice-card">
        <img src="images/ice5.jpg" alt="ソーダ">
        <h3>ソーダ</h3>
        <button class="detail-btn" data-title="ソーダ" data-desc="夏にぴったり！シュワっと爽快なラムネ味で、気分もリフレッシュできます。">詳細を見る</button>
    </div>

    <div class="ice-card">
        <img src="images/ice6.jpg" alt="クッキー">
        <h3>クッキー</h3>
        <button class="detail-btn" data-title="クッキー" data-desc="しっとり、ザクザクとしたココアクッキーがたっぷり混ざった、食べ応え抜群の人気味です。">詳細を見る</button>
    </div>

</div>

<div id="ice-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title">アイスの名前</h2>
        <p id="modal-desc">ここに詳細な説明文が入ります。</p>
    </div>
</div>

<script>
const modal = document.getElementById('ice-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
const closeBtn = document.querySelector('.close-btn');
const detailButtons = document.querySelectorAll('.detail-btn');

detailButtons.forEach(button => {
    button.addEventListener('click', () => {
        modalTitle.textContent = button.getAttribute('data-title');
        modalDesc.textContent = button.getAttribute('data-desc');
        modal.style.display = 'block';
    });
});

closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
window.addEventListener('click', (e) => { if (e.target === modal) { modal.style.display = 'none'; } });
</script>
</main>

</body>
</html>
